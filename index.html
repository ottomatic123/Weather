<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skyline">
<meta name="theme-color" content="#0b1026">
<title>Skyline</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --sky1:#12233f; --sky2:#2a4a7a; --sky3:#5a86bd;
    --ink:#f3f7fc; --ink-dim:rgba(243,247,252,.72); --ink-faint:rgba(243,247,252,.5);
    --glass:rgba(255,255,255,.09); --glass-2:rgba(255,255,255,.055);
    --stroke:rgba(255,255,255,.14); --stroke-2:rgba(255,255,255,.09);
    --accent:#ffb26b; --accent-hot:#ff8f5e;
    --alert:#ffcf5c; --alert-bad:#ff7a6b;
    --f-ui:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
    --f-disp:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,system-ui,sans-serif;
    --f-num:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    font-family:var(--f-ui);color:var(--ink);
    background:linear-gradient(180deg,var(--sky1) 0%, var(--sky2) 46%, var(--sky3) 100%);
    background-attachment:fixed;
    transition:background 1.1s ease;
    -webkit-font-smoothing:antialiased;
    padding:max(10px,env(safe-area-inset-top)) 14px calc(26px + env(safe-area-inset-bottom));
    max-width:540px;margin:0 auto;overflow-x:hidden;
  }
  /* faint atmosphere */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(120% 60% at 80% 0%, rgba(255,255,255,.10), transparent 60%);}
  .app{position:relative;z-index:1;display:flex;flex-direction:column;gap:14px;}

  /* header */
  .head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 2px 0;}
  .loc{display:flex;flex-direction:column;min-width:0;}
  .loc .name{font-family:var(--f-disp);font-size:20px;font-weight:600;letter-spacing:-.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .loc .upd{font-size:11px;color:var(--ink-faint);margin-top:1px;}
  .hbtns{display:flex;gap:8px;}
  .icobtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--stroke);
    background:var(--glass);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:transform .06s,background .15s;}
  .icobtn:active{transform:scale(.93);background:var(--glass-2);}
  .icobtn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  /* hero */
  .hero{position:relative;padding:20px 8px 8px;text-align:center;}
  .hero .glyph{width:78px;height:78px;margin:0 auto 2px;}
  .hero .temp{font-family:var(--f-disp);font-weight:200;font-size:96px;line-height:.94;letter-spacing:-.04em;
    text-shadow:0 2px 30px rgba(0,0,0,.28);}
  .hero .temp .o{font-weight:200;}
  .hero .cond{font-size:17px;font-weight:500;margin-top:2px;color:var(--ink);}
  .hero .meta{display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:14px;color:var(--ink-dim);}
  .hero .meta b{color:var(--ink);font-weight:600;}
  .feels{font-size:13px;color:var(--ink-faint);margin-top:4px;}

  /* alert */
  .alerts{display:flex;flex-direction:column;gap:8px;}
  .alert{border-radius:14px;padding:12px 14px;border:1px solid rgba(255,207,92,.4);
    background:linear-gradient(180deg,rgba(255,207,92,.16),rgba(255,207,92,.07));cursor:pointer;}
  .alert.sev-bad{border-color:rgba(255,122,107,.5);background:linear-gradient(180deg,rgba(255,122,107,.18),rgba(255,122,107,.08));}
  .alert .a-top{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;}
  .alert .a-top .adot{width:8px;height:8px;border-radius:50%;background:var(--alert);flex:none;box-shadow:0 0 10px var(--alert);}
  .alert.sev-bad .a-top .adot{background:var(--alert-bad);box-shadow:0 0 10px var(--alert-bad);}
  .alert .a-body{font-size:12.5px;color:var(--ink-dim);margin-top:6px;line-height:1.5;display:none;white-space:pre-wrap;}
  .alert.open .a-body{display:block;}
  .alert .a-hint{font-size:11px;color:var(--ink-faint);margin-top:5px;}

  /* card */
  .card{background:var(--glass);border:1px solid var(--stroke);border-radius:18px;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);overflow:hidden;}
  .card h2{margin:0;padding:13px 15px 0;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;}

  /* hourly */
  .hourly{display:flex;gap:2px;overflow-x:auto;padding:12px 8px 14px;scrollbar-width:none;}
  .hourly::-webkit-scrollbar{display:none;}
  .hr{flex:0 0 auto;width:58px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:4px 2px;}
  .hr .h-t{font-size:12px;color:var(--ink-dim);}
  .hr .h-g{width:26px;height:26px;}
  .hr .h-p{font-size:10.5px;color:#8fd0ff;min-height:13px;font-family:var(--f-num);}
  .hr .h-temp{font-size:15px;font-weight:600;}
  .hr.now .h-t{color:var(--accent);font-weight:700;}

  /* radar */
  .radar-card{padding-bottom:10px;}
  #map{height:300px;width:100%;background:#0c1016;margin-top:11px;}
  .leaflet-container{background:#0c1016;font-family:var(--f-ui);}
  .radar-ctl{display:flex;align-items:center;gap:11px;padding:11px 14px 5px;}
  .playbtn{width:42px;height:42px;flex:none;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(180deg,var(--accent),var(--accent-hot));color:#3a1e0c;
    display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  .playbtn svg{width:18px;height:18px;fill:currentColor;}
  .scrub{flex:1;display:flex;flex-direction:column;gap:4px;}
  .scrub input{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--stroke);outline:none;}
  .scrub input::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.5);cursor:pointer;}
  .scrub .stamp{font-size:11.5px;color:var(--ink-dim);font-family:var(--f-num);display:flex;justify-content:space-between;}
  .scrub .stamp .future{color:var(--accent);}

  /* daily */
  .daily{padding:6px 6px 8px;}
  .day{display:grid;grid-template-columns:52px 26px 40px 1fr 78px;align-items:center;gap:9px;padding:9px 9px;border-radius:12px;}
  .day+.day{border-top:1px solid var(--stroke-2);}
  .day .d-n{font-size:14px;font-weight:600;}
  .day .d-g{width:24px;height:24px;}
  .day .d-p{font-size:11px;color:#8fd0ff;font-family:var(--f-num);}
  .day .bar{position:relative;height:5px;border-radius:3px;background:var(--stroke);}
  .day .bar .rng{position:absolute;height:100%;border-radius:3px;
    background:linear-gradient(90deg,#68b7ff,#ffd06b,#ff9d5c);}
  .day .d-hl{font-size:13.5px;text-align:right;font-family:var(--f-num);}
  .day .d-hl .lo{color:var(--ink-faint);}

  /* details grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .tile{background:var(--glass);border:1px solid var(--stroke);border-radius:16px;padding:13px 14px;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);min-height:84px;}
  .tile .t-l{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);display:flex;align-items:center;gap:6px;}
  .tile .t-l svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .tile .t-v{font-family:var(--f-disp);font-size:26px;font-weight:300;margin-top:8px;letter-spacing:-.01em;}
  .tile .t-s{font-size:11.5px;color:var(--ink-faint);margin-top:2px;}

  .foot{text-align:center;font-size:11px;color:var(--ink-faint);line-height:1.7;padding:2px 6px;}
  .foot a{color:var(--ink-dim);}

  /* search sheet */
  .sheet{position:fixed;inset:0;z-index:30;background:rgba(6,10,20,.55);backdrop-filter:blur(8px);
    display:none;align-items:flex-start;justify-content:center;padding:80px 16px 16px;}
  .sheet.on{display:flex;}
  .sheet .box{width:100%;max-width:440px;background:rgba(20,28,44,.96);border:1px solid var(--stroke);
    border-radius:18px;padding:14px;}
  .sheet input{width:100%;background:rgba(255,255,255,.08);border:1px solid var(--stroke);border-radius:12px;
    color:var(--ink);font-size:16px;padding:13px 14px;outline:none;font-family:var(--f-ui);}
  .sheet input:focus{border-color:var(--accent);}
  .results{margin-top:8px;max-height:50vh;overflow:auto;}
  .results button{display:flex;flex-direction:column;align-items:flex-start;width:100%;text-align:left;
    background:transparent;border:0;border-radius:10px;color:var(--ink);padding:11px 12px;cursor:pointer;gap:2px;}
  .results button:active{background:var(--glass);}
  .results .r-n{font-size:15px;font-weight:600;}
  .results .r-s{font-size:12px;color:var(--ink-faint);}
  .results .r-empty{color:var(--ink-faint);font-size:13px;padding:12px;}

  .toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:rgba(20,28,44,.96);border:1px solid var(--stroke);color:var(--ink);font-size:13px;
    padding:11px 16px;border-radius:12px;z-index:40;opacity:0;transition:opacity .3s;pointer-events:none;max-width:88vw;text-align:center;}
  .toast.on{opacity:1;}
  .skeleton{color:transparent!important;background:var(--glass-2);border-radius:6px;animation:sk 1.3s infinite;}
  @keyframes sk{50%{opacity:.5}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body data-sky="clear-day">
<div class="app">
  <div class="head">
    <div class="loc">
      <div class="name" id="locName">Locating…</div>
      <div class="upd" id="locUpd">—</div>
    </div>
    <div class="hbtns">
      <button class="icobtn" id="btnLoc" title="Use my location"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></button>
      <button class="icobtn" id="btnSearch" title="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg></button>
    </div>
  </div>

  <div class="hero">
    <div class="glyph" id="heroGlyph"></div>
    <div class="temp" id="heroTemp">—<span class="o">°</span></div>
    <div class="cond" id="heroCond">—</div>
    <div class="meta"><span>H:<b id="heroHi">—</b></span><span>L:<b id="heroLo">—</b></span></div>
    <div class="feels" id="heroFeels"></div>
  </div>

  <div class="alerts" id="alerts"></div>

  <div class="card">
    <h2>Hourly</h2>
    <div class="hourly" id="hourly"></div>
  </div>

  <div class="card radar-card">
    <h2 style="padding-bottom:0">Radar · The Weather Channel colors</h2>
    <div id="map"></div>
    <div class="radar-ctl">
      <button class="playbtn" id="playBtn"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <div class="scrub">
        <input type="range" id="scrub" min="0" max="0" value="0">
        <div class="stamp"><span id="stampNow">—</span><span id="stampFut" class="future"></span></div>
      </div>
    </div>
  </div>

  <div class="card"><h2>10‑day forecast</h2><div class="daily" id="daily"></div></div>

  <div class="grid" id="details"></div>

  <div class="foot">
    Forecast: Open‑Meteo · US temps: National Weather Service · Radar: RainViewer<br>
    Add to Home Screen for full‑screen, app‑like use.
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="box">
    <input id="searchInput" placeholder="Search city or place…" autocomplete="off" autocapitalize="words">
    <div class="results" id="results"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
"use strict";
/* ============ Skyline — a smoother, ad-free weather app ============
   Forecast : Open-Meteo (no key, global)
   Radar    : RainViewer public tiles (no key), color scheme 4 = Weather Channel
   Alerts   : api.weather.gov (US, official)
   =================================================================== */

const DEFAULT = { lat:27.9506, lon:-82.4572, name:"Tampa, FL" }; // fallback only
let unit = localStorage.getItem("sky_unit") || "F";
let place = JSON.parse(localStorage.getItem("sky_place")||"null") || DEFAULT;

const $ = s => document.querySelector(s);
const el = id => document.getElementById(id);
const tempU = () => unit==="F" ? "fahrenheit" : "celsius";
const windU = () => unit==="F" ? "mph" : "kmh";
const precU = () => unit==="F" ? "inch" : "mm";

/* ---------- weather-code → icon + label + sky theme ---------- */
const G = {}; // glyph builder cache
function svg(inner,vb="0 0 64 64"){return `<svg viewBox="${vb}" style="width:100%;height:100%">${inner}</svg>`;}
const C = { sun:"#ffd66b", moon:"#e8eefc", cloud:"#dfe7f2", cloudDk:"#b9c4d6", rain:"#7fc4ff", bolt:"#ffd66b", snow:"#eaf3ff" };
function gSun(){return svg(`<circle cx="32" cy="32" r="13" fill="${C.sun}"/>${rays()}`);}
function rays(){let p="";for(let i=0;i<8;i++){const a=i*45*Math.PI/180,x=32+Math.cos(a)*22,y=32+Math.sin(a)*22,x2=32+Math.cos(a)*27,y2=32+Math.sin(a)*27;p+=`<line x1="${x.toFixed(1)}" y1="${y.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${C.sun}" stroke-width="3" stroke-linecap="round"/>`;}return p;}
function gMoon(){return svg(`<path d="M42 40a16 16 0 1 1-14-25 13 13 0 0 0 14 25z" fill="${C.moon}"/>`);}
function cloudPath(fill){return `<path d="M20 44h26a10 10 0 0 0 1-20 14 14 0 0 0-26-3 9 9 0 0 0-1 23z" fill="${fill}"/>`;}
function gCloud(){return svg(cloudPath(C.cloud));}
function gPartlyDay(){return svg(`<circle cx="24" cy="24" r="9" fill="${C.sun}"/>${cloudPath(C.cloud)}`);}
function gPartlyNight(){return svg(`<path d="M30 26a10 10 0 1 1-8-15 8 8 0 0 0 8 15z" fill="${C.moon}"/>${cloudPath(C.cloud)}`);}
function drops(y){return `<line x1="24" y1="${y}" x2="21" y2="${y+7}" stroke="${C.rain}" stroke-width="3" stroke-linecap="round"/><line x1="34" y1="${y}" x2="31" y2="${y+7}" stroke="${C.rain}" stroke-width="3" stroke-linecap="round"/><line x1="44" y1="${y}" x2="41" y2="${y+7}" stroke="${C.rain}" stroke-width="3" stroke-linecap="round"/>`;}
function gRain(){return svg(cloudPath(C.cloudDk)+drops(48));}
function gStorm(){return svg(cloudPath(C.cloudDk)+`<path d="M32 44l-6 10h6l-4 8 12-13h-7l5-5z" fill="${C.bolt}"/>`);}
function flakes(){let p="";[[24,50],[34,54],[44,50]].forEach(([x,y])=>{p+=`<circle cx="${x}" cy="${y}" r="2.4" fill="${C.snow}"/>`;});return p;}
function gSnow(){return svg(cloudPath(C.cloudDk)+flakes());}
function gFog(){return svg(cloudPath(C.cloud)+`<line x1="16" y1="50" x2="44" y2="50" stroke="${C.cloudDk}" stroke-width="3" stroke-linecap="round"/><line x1="20" y1="56" x2="48" y2="56" stroke="${C.cloudDk}" stroke-width="3" stroke-linecap="round"/>`);}

function decode(code, isDay){
  const d = isDay!==0;
  if(code===0) return {label:d?"Clear":"Clear night", glyph:d?gSun:gMoon, sky:d?"clear-day":"clear-night"};
  if(code===1||code===2) return {label:"Partly cloudy", glyph:d?gPartlyDay:gPartlyNight, sky:d?"pcloud-day":"pcloud-night"};
  if(code===3) return {label:"Overcast", glyph:gCloud, sky:d?"cloud-day":"cloud-night"};
  if(code===45||code===48) return {label:"Fog", glyph:gFog, sky:"fog"};
  if(code>=51&&code<=57) return {label:"Drizzle", glyph:gRain, sky:"rain"};
  if(code>=61&&code<=67) return {label:"Rain", glyph:gRain, sky:"rain"};
  if(code>=71&&code<=77) return {label:"Snow", glyph:gSnow, sky:"snow"};
  if(code>=80&&code<=82) return {label:"Rain showers", glyph:gRain, sky:"rain"};
  if(code===85||code===86) return {label:"Snow showers", glyph:gSnow, sky:"snow"};
  if(code>=95) return {label:"Thunderstorm", glyph:gStorm, sky:"storm"};
  return {label:"—", glyph:gCloud, sky:"cloud-day"};
}
const SKIES = {
  "clear-day":["#12233f","#2a5a9e","#7db2e6"], "clear-night":["#070b1c","#141c46","#2a2f66"],
  "pcloud-day":["#1c3350","#3f6699","#8aa8cc"], "pcloud-night":["#0a0f22","#1b2547","#333a63"],
  "cloud-day":["#2c3b4e","#4d6076","#7d8ea3"], "cloud-night":["#10151d","#242c39","#3a4453"],
  "rain":["#16232b","#28414e","#41606f"], "storm":["#12141d","#232735","#39405a"],
  "snow":["#33414f","#5b6f88","#9fb2ca"], "fog":["#2a333d","#495563","#79879a"]
};
function setSky(key){
  const s = SKIES[key]||SKIES["clear-day"];
  document.body.dataset.sky=key;
  document.documentElement.style.setProperty("--sky1",s[0]);
  document.documentElement.style.setProperty("--sky2",s[1]);
  document.documentElement.style.setProperty("--sky3",s[2]);
  const meta=document.querySelector('meta[name=theme-color]'); if(meta) meta.content=s[0];
}

/* ---------- formatting ---------- */
const rnd = n => Math.round(n);
const fmtT = n => (n==null?"—":rnd(n))+"°";
function hourLabel(iso){const d=new Date(iso);let h=d.getHours();const ap=h<12?"AM":"PM";h=h%12;if(h===0)h=12;return h+ap;}
function dayLabel(iso,i){if(i===0)return "Today";return new Date(iso+"T00:00").toLocaleDateString([], {weekday:"short"});}
function clockLabel(ts){return new Date(ts*1000).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});}

/* ---------- toast ---------- */
let toastT;
function toast(msg){const t=el("toast");t.textContent=msg;t.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("on"),2600);}

/* ---------- fetch forecast ---------- */
async function loadWeather(){
  el("locName").textContent = place.name;
  const p = new URLSearchParams({
    latitude:place.lat, longitude:place.lon,
    current:"temperature_2m,relative_humidity_2m,apparent_temperature,is_day,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,precipitation",
    hourly:"temperature_2m,weather_code,precipitation_probability,is_day",
    daily:"weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset,uv_index_max",
    temperature_unit:tempU(), wind_speed_unit:windU(), precipitation_unit:precU(),
    timezone:"auto", forecast_days:"10"
  });
  let data;
  try{
    const r = await fetch("https://api.open-meteo.com/v1/forecast?"+p.toString());
    if(!r.ok) throw new Error("HTTP "+r.status);
    data = await r.json();
  }catch(e){ toast("Couldn't load forecast. Check connection."); console.error(e); return; }
  renderCurrent(data);
  renderHourly(data);
  renderDaily(data);
  renderDetails(data);
  el("locUpd").textContent = "Updated "+new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});
  loadAlerts();
  centerRadar();
  patchWithNWS(data);   // US: correct temps to official NWS numbers
}

/* ---------- NWS temperature correction (US only, best-effort) ----------
   Open-Meteo runs ~2-3° warm vs NWS in some regions. For US points we
   overlay the official NWS forecast temps (same source as Weather Channel).
   Keeps Open-Meteo's codes, details, sun times, UV, days 8-10, and all
   non-US locations untouched. Silently does nothing if NWS isn't available. */
async function patchWithNWS(d){
  try{
    const nh = {headers:{"Accept":"application/geo+json"}};
    const pr = await fetch(`https://api.weather.gov/points/${place.lat.toFixed(4)},${place.lon.toFixed(4)}`, nh);
    if(!pr.ok) return;                       // non-US → 404 → keep Open-Meteo
    const pj = await pr.json();
    const hourlyUrl = pj.properties && pj.properties.forecastHourly;
    const dailyUrl  = pj.properties && pj.properties.forecast;
    if(!hourlyUrl) return;
    const [hr, dr] = await Promise.all([ fetch(hourlyUrl, nh), dailyUrl?fetch(dailyUrl, nh):Promise.resolve(null) ]);
    if(!hr.ok) return;
    const periods = (await hr.json()).properties.periods;   // hourly, °F
    const toU = f => unit==="F" ? f : (f-32)*5/9;
    const epochHr = t => Math.floor(Date.parse(t)/3600000);

    // hourly map
    const hmap = new Map();
    periods.forEach(p=>hmap.set(epochHr(p.startTime), {
      temp:p.temperature,
      pop:(p.probabilityOfPrecipitation&&p.probabilityOfPrecipitation.value),
      rh:(p.relativeHumidity&&p.relativeHumidity.value)
    }));

    // patch hourly array in place
    for(let i=0;i<d.hourly.time.length;i++){
      const m=hmap.get(epochHr(d.hourly.time[i]));
      if(m){ d.hourly.temperature_2m[i]=toU(m.temp); if(m.pop!=null) d.hourly.precipitation_probability[i]=m.pop; }
    }
    // patch current
    const cm = hmap.get(Math.floor(Date.now()/3600000)) || (periods[0] && {temp:periods[0].temperature, rh:(periods[0].relativeHumidity&&periods[0].relativeHumidity.value)});
    if(cm){
      const newT=toU(cm.temp);
      const delta=newT - d.current.temperature_2m;
      d.current.temperature_2m=newT;
      d.current.apparent_temperature += delta;           // shift feels-like by same amount
      if(cm.rh!=null) d.current.relative_humidity_2m=cm.rh;
    }
    // patch daily (only where NWS has a full day/night pair, so "Today" high isn't lost in the evening)
    if(dr && dr.ok){
      const byDate=new Map();
      (await dr.json()).properties.periods.forEach(p=>{
        const date=p.startTime.slice(0,10);
        const o=byDate.get(date)||{day:null,night:null,pops:[]};
        if(p.isDaytime) o.day=p.temperature; else o.night=p.temperature;
        const pop=(p.probabilityOfPrecipitation&&p.probabilityOfPrecipitation.value); if(pop!=null)o.pops.push(pop);
        byDate.set(date,o);
      });
      for(let i=0;i<d.daily.time.length;i++){
        const o=byDate.get(d.daily.time[i]); if(!o) continue;
        if(o.day!=null)   d.daily.temperature_2m_max[i]=toU(o.day);
        if(o.night!=null) d.daily.temperature_2m_min[i]=toU(o.night);
        if(o.pops.length) d.daily.precipitation_probability_max[i]=Math.max(...o.pops);
      }
    }
    // re-render with corrected numbers
    renderCurrent(d); renderHourly(d); renderDaily(d); renderDetails(d);
    el("locUpd").textContent = "Updated "+new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"})+" · NWS";
  }catch(e){ /* keep Open-Meteo values on any error */ }
}

function renderCurrent(d){
  const c=d.current, day=d.daily;
  const info=decode(c.weather_code, c.is_day);
  setSky(info.sky);
  el("heroGlyph").innerHTML=info.glyph();
  el("heroTemp").innerHTML=rnd(c.temperature_2m)+'<span class="o">°</span>';
  el("heroCond").textContent=info.label;
  el("heroHi").textContent=fmtT(day.temperature_2m_max[0]);
  el("heroLo").textContent=fmtT(day.temperature_2m_min[0]);
  const feels=rnd(c.apparent_temperature);
  el("heroFeels").textContent = "Feels like "+feels+"°";
  window.__cur=c;
}

function renderHourly(d){
  const h=d.hourly, now=Date.now();
  // find first index at/after current hour
  let start=h.time.findIndex(t=>new Date(t).getTime()>=now-3600e3);
  if(start<0)start=0;
  const box=el("hourly"); box.innerHTML="";
  for(let i=start;i<start+24 && i<h.time.length;i++){
    const info=decode(h.weather_code[i], h.is_day[i]);
    const isNow = i===start;
    const pop=h.precipitation_probability[i];
    const div=document.createElement("div");
    div.className="hr"+(isNow?" now":"");
    div.innerHTML=`<div class="h-t">${isNow?"Now":hourLabel(h.time[i])}</div>
      <div class="h-g">${info.glyph()}</div>
      <div class="h-p">${pop>=10?pop+"%":""}</div>
      <div class="h-temp">${fmtT(h.temperature_2m[i])}</div>`;
    box.appendChild(div);
  }
}

function renderDaily(d){
  const dl=d.daily; const box=el("daily"); box.innerHTML="";
  let gMin=Math.min(...dl.temperature_2m_min), gMax=Math.max(...dl.temperature_2m_max);
  const span=Math.max(1,gMax-gMin);
  for(let i=0;i<dl.time.length;i++){
    const info=decode(dl.weather_code[i],1);
    const lo=dl.temperature_2m_min[i], hi=dl.temperature_2m_max[i];
    const left=((lo-gMin)/span)*100, width=Math.max(8,((hi-lo)/span)*100);
    const pop=dl.precipitation_probability_max[i];
    const row=document.createElement("div"); row.className="day";
    row.innerHTML=`<div class="d-n">${dayLabel(dl.time[i],i)}</div>
      <div class="d-g">${info.glyph()}</div>
      <div class="d-p">${pop>=10?pop+"%":""}</div>
      <div class="bar"><div class="rng" style="left:${left}%;width:${width}%"></div></div>
      <div class="d-hl"><span class="lo">${fmtT(lo)}</span> ${fmtT(hi)}</div>`;
    box.appendChild(row);
  }
}

function icoWind(){return '<svg viewBox="0 0 24 24"><path d="M3 8h11a3 3 0 1 0-3-3M3 12h15a3 3 0 1 1-3 3M3 16h9a2.5 2.5 0 1 1-2.5 2.5"/></svg>';}
function icoDrop(){return '<svg viewBox="0 0 24 24"><path d="M12 3s6 6.5 6 11a6 6 0 0 1-12 0c0-4.5 6-11 6-11z"/></svg>';}
function icoSun(){return '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>';}
function icoGauge(){return '<svg viewBox="0 0 24 24"><path d="M4 15a8 8 0 1 1 16 0"/><path d="M12 15l4-4"/></svg>';}
function icoUp(){return '<svg viewBox="0 0 24 24"><path d="M12 19V5M6 11l6-6 6 6"/></svg>';}
function icoDown(){return '<svg viewBox="0 0 24 24"><path d="M12 5v14M6 13l6 6 6-6"/></svg>';}
const WDIR=["N","NE","E","SE","S","SW","W","NW"];
function windDir(deg){return WDIR[Math.round(deg/45)%8];}

function renderDetails(d){
  const c=d.current, dl=d.daily;
  const uv=dl.uv_index_max[0];
  const uvTxt = uv==null?"—":(uv<3?"Low":uv<6?"Moderate":uv<8?"High":uv<11?"Very high":"Extreme");
  const wu = unit==="F"?"mph":"km/h";
  const pu = unit==="F"?'"Hg':"hPa";
  const pv = unit==="F"? (c.surface_pressure*0.02953).toFixed(2) : rnd(c.surface_pressure);
  const items=[
    {l:"Feels like",ico:icoSun(),v:rnd(c.apparent_temperature)+"°",s:"Actual "+rnd(c.temperature_2m)+"°"},
    {l:"Humidity",ico:icoDrop(),v:c.relative_humidity_2m+"%",s:""},
    {l:"Wind",ico:icoWind(),v:rnd(c.wind_speed_10m)+" "+wu,s:"From "+windDir(c.wind_direction_10m)},
    {l:"UV index",ico:icoSun(),v:(uv==null?"—":Math.round(uv)),s:uvTxt},
    {l:"Sunrise",ico:icoUp(),v:new Date(dl.sunrise[0]).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}),s:""},
    {l:"Sunset",ico:icoDown(),v:new Date(dl.sunset[0]).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}),s:""},
    {l:"Pressure",ico:icoGauge(),v:pv,s:pu},
    {l:"Precip prob",ico:icoDrop(),v:(dl.precipitation_probability_max[0]??0)+"%",s:"today max"}
  ];
  el("details").innerHTML=items.map(it=>`<div class="tile"><div class="t-l">${it.ico}${it.l}</div><div class="t-v">${it.v}</div><div class="t-s">${it.s||""}</div></div>`).join("");
}

/* ---------- alerts (US, NWS) ---------- */
async function loadAlerts(){
  const box=el("alerts"); box.innerHTML="";
  try{
    const r=await fetch(`https://api.weather.gov/alerts/active?point=${place.lat.toFixed(4)},${place.lon.toFixed(4)}`,
      {headers:{"Accept":"application/geo+json"}});
    if(!r.ok) return;
    const j=await r.json();
    if(!j.features||!j.features.length) return;
    const seen=new Set();
    j.features.slice(0,4).forEach(f=>{
      const p=f.properties; if(seen.has(p.event))return; seen.add(p.event);
      const bad=/warning|emergency|extreme/i.test((p.severity||"")+p.event);
      const div=document.createElement("div");
      div.className="alert"+(bad?" sev-bad":"");
      div.innerHTML=`<div class="a-top"><span class="adot"></span>${p.event}</div>
        <div class="a-hint">Tap for details · ${p.senderName||"NWS"}</div>
        <div class="a-body">${(p.headline||"")}\n\n${(p.description||"").slice(0,700)}</div>`;
      div.addEventListener("click",()=>div.classList.toggle("open"));
      box.appendChild(div);
    });
  }catch(e){ /* alerts are US-only / best-effort */ }
}

/* ============ RADAR (RainViewer + Leaflet) ============ */
let map, radarFrames=[], radarLayers={}, radarPos=0, radarTimer=null, radarHost="";
const RADAR_COLOR=4;   // 4 = The Weather Channel
const FRAME_MS=480;

function initMap(){
  map=L.map("map",{zoomControl:true,attributionControl:true,maxZoom:12,minZoom:3}).setView([place.lat,place.lon],7);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
    subdomains:"abcd", attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19
  }).addTo(map);
  L.circleMarker([place.lat,place.lon],{radius:6,color:"#fff",weight:2,fillColor:"#ffb26b",fillOpacity:1}).addTo(map);
  loadRadar();
}
function centerRadar(){
  if(!map) return;
  map.setView([place.lat,place.lon],map.getZoom()||7);
  // refresh marker
  map.eachLayer(l=>{ if(l instanceof L.CircleMarker) map.removeLayer(l); });
  L.circleMarker([place.lat,place.lon],{radius:6,color:"#fff",weight:2,fillColor:"#ffb26b",fillOpacity:1}).addTo(map);
}
async function loadRadar(){
  try{
    const r=await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const j=await r.json();
    radarHost=j.host;
    const past=(j.radar&&j.radar.past)||[];
    const now=(j.radar&&j.radar.nowcast)||[];
    radarFrames=past.concat(now);
    __nowIdx=Math.max(0,past.length-1);   // last past frame = "now"
    // clear old layers
    Object.values(radarLayers).forEach(l=>map.removeLayer(l)); radarLayers={};
    el("scrub").max=Math.max(0,radarFrames.length-1);
    radarPos=__nowIdx;   // start at "now"
    el("scrub").value=radarPos;
    showFrame(radarPos);
    play(); // autoplay the loop
  }catch(e){ el("stampNow").textContent="Radar unavailable"; }
}
function frameLayer(i){
  if(radarLayers[i]) return radarLayers[i];
  const f=radarFrames[i];
  const url=`${radarHost}${f.path}/256/{z}/{x}/{y}/${RADAR_COLOR}/1_1.png`;
  const layer=L.tileLayer(url,{opacity:0,maxNativeZoom:7,maxZoom:12,tileSize:256});
  layer.addTo(map); radarLayers[i]=layer; return layer;
}
function showFrame(i){
  radarFrames.forEach((_,k)=>{ if(radarLayers[k]) radarLayers[k].setOpacity(0); });
  const layer=frameLayer(i); layer.setOpacity(0.75);
  // preload neighbour
  if(radarFrames[i+1]) frameLayer(i+1);
  const f=radarFrames[i];
  const pastCount=radarFrames.length; // stamp
  const future = i>getNowIndex();
  el("stampNow").textContent=(future?"Forecast · ":"")+clockLabel(f.time);
  el("stampFut").textContent = future? "+"+Math.round((f.time-radarFrames[getNowIndex()].time)/60)+" min" : "now";
  el("scrub").value=i;
}
let __nowIdx=0;
function getNowIndex(){return __nowIdx;}
function play(){
  el("playIcon").innerHTML='<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  clearInterval(radarTimer);
  radarTimer=setInterval(()=>{
    radarPos++; if(radarPos>=radarFrames.length) radarPos=0;
    showFrame(radarPos);
  },FRAME_MS);
}
function pause(){ el("playIcon").innerHTML='<path d="M8 5v14l11-7z"/>'; clearInterval(radarTimer); radarTimer=null; }

/* ---------- geolocation + search ---------- */
function useMyLocation(){
  if(!navigator.geolocation){ toast("Location not available"); return; }
  toast("Getting your location…");
  navigator.geolocation.getCurrentPosition(async pos=>{
    place={lat:pos.coords.latitude, lon:pos.coords.longitude, name:"My location"};
    // reverse geocode for a nice name
    try{
      const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?latitude=${place.lat}&longitude=${place.lon}&count=1`);
      const j=await r.json();
      if(j.results&&j.results[0]){const g=j.results[0];place.name=g.name+(g.admin1?", "+g.admin1:"");}
    }catch(e){}
    savePlace(); loadWeather();
  },err=>{ toast("Location permission denied"); }, {enableHighAccuracy:false,timeout:8000,maximumAge:600000});
}
function savePlace(){ localStorage.setItem("sky_place",JSON.stringify(place)); }

let searchT;
async function doSearch(q){
  const box=el("results");
  if(!q.trim()){box.innerHTML="";return;}
  try{
    const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=en&format=json`);
    const j=await r.json();
    if(!j.results||!j.results.length){box.innerHTML='<div class="r-empty">No matches.</div>';return;}
    box.innerHTML="";
    j.results.forEach(g=>{
      const sub=[g.admin1,g.country].filter(Boolean).join(", ");
      const b=document.createElement("button");
      b.innerHTML=`<span class="r-n">${g.name}</span><span class="r-s">${sub}</span>`;
      b.addEventListener("click",()=>{
        place={lat:g.latitude,lon:g.longitude,name:g.name+(g.admin1?", "+g.admin1:"")};
        savePlace(); closeSheet(); loadWeather();
      });
      box.appendChild(b);
    });
  }catch(e){ box.innerHTML='<div class="r-empty">Search failed.</div>'; }
}
function openSheet(){el("sheet").classList.add("on");el("searchInput").value="";el("results").innerHTML="";setTimeout(()=>el("searchInput").focus(),50);}
function closeSheet(){el("sheet").classList.remove("on");}

/* ---------- unit toggle via tapping hero temp ---------- */
function toggleUnit(){ unit = unit==="F"?"C":"F"; localStorage.setItem("sky_unit",unit); toast("Units: °"+unit); loadWeather(); }

/* ---------- boot ---------- */
window.addEventListener("DOMContentLoaded",()=>{
  el("btnLoc").addEventListener("click",useMyLocation);
  el("btnSearch").addEventListener("click",openSheet);
  el("sheet").addEventListener("click",e=>{ if(e.target===el("sheet")) closeSheet(); });
  el("searchInput").addEventListener("input",e=>{ clearTimeout(searchT); const v=e.target.value; searchT=setTimeout(()=>doSearch(v),300); });
  el("heroTemp").addEventListener("click",toggleUnit);
  el("playBtn").addEventListener("click",()=>{ radarTimer?pause():play(); });
  el("scrub").addEventListener("input",e=>{ pause(); radarPos=+e.target.value; showFrame(radarPos); });

  initMap();
  loadWeather();
  // nudge nowIndex: past frames end where nowcast begins — approximate as middle
});
</script>
