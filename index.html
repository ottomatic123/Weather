<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skyline">
<meta name="theme-color" content="#0b1026">
<title>Skyline</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --sky1:#0f2a52; --sky2:#22518c; --sky3:#4d84c2; --glow:rgba(255,196,120,.30);
    --ink:#f4f8ff; --ink-dim:rgba(244,248,255,.74); --ink-faint:rgba(244,248,255,.46);
    --glass-hi:rgba(255,255,255,.30); --stroke:rgba(255,255,255,.14);
    --accent:#ffc27a; --accent-hot:#ff9d5c;
    --alert:#ffd15c; --alert-bad:#ff7d6b;
    --f-ui:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
    --f-disp:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,system-ui,sans-serif;
    --f-num:"SF Pro Display",ui-rounded,-apple-system,system-ui,sans-serif;
    --card:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    font-family:var(--f-ui);color:var(--ink);
    background:linear-gradient(178deg,var(--sky1) 0%, var(--sky2) 48%, var(--sky3) 100%);
    background-attachment:fixed;transition:background 1.2s ease;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    padding:max(10px,env(safe-area-inset-top)) 15px calc(30px + env(safe-area-inset-bottom));
    max-width:540px;margin:0 auto;overflow-x:hidden;position:relative;
  }
  /* atmospheric depth: soft light source + horizon glow, tuned per condition */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity 1.2s,background 1.2s;
    background:
      radial-gradient(70% 42% at 78% 6%, rgba(255,255,255,.16), transparent 62%),
      radial-gradient(120% 55% at 50% 118%, var(--glow), transparent 60%);}
  /* fine film grain — kills the flat-gradient look */
  .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 1.4s;
    background-image:radial-gradient(1.4px 1.4px at 20% 22%,#fff,transparent),radial-gradient(1.2px 1.2px at 68% 14%,#fff,transparent),radial-gradient(1px 1px at 42% 34%,#fff,transparent),radial-gradient(1.3px 1.3px at 84% 40%,#fff,transparent),radial-gradient(1px 1px at 12% 52%,#fff,transparent),radial-gradient(1.1px 1.1px at 56% 8%,#fff,transparent),radial-gradient(1px 1px at 90% 20%,#fff,transparent);}
  body[data-sky$="night"] .stars{opacity:.7;}
  body[data-sky="fog"]::before,body[data-sky="rain"]::before,body[data-sky="storm"]::before{opacity:.5;}
  .app{position:relative;z-index:2;display:flex;flex-direction:column;gap:15px;}

  /* header */
  .head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 2px 0;}
  .loc .name{font-family:var(--f-disp);font-size:22px;font-weight:600;letter-spacing:-.015em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60vw;text-shadow:0 1px 12px rgba(0,0,0,.25);}
  .loc .upd{font-size:11.5px;color:var(--ink-faint);margin-top:2px;letter-spacing:.01em;}
  .hbtns{display:flex;gap:9px;}
  .icobtn{width:42px;height:42px;border-radius:14px;border:1px solid var(--stroke);
    background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.06));color:var(--ink);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:inset 0 1px 0 var(--glass-hi),0 4px 14px -8px rgba(0,0,0,.5);transition:transform .08s,background .2s;}
  .icobtn:active{transform:scale(.92);}
  .icobtn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}

  /* hero */
  .hero{position:relative;padding:22px 8px 6px;text-align:center;}
  .hero .glyph{width:96px;height:96px;margin:0 auto -4px;filter:drop-shadow(0 8px 22px rgba(0,0,0,.28));}
  .hero .temp{font-family:var(--f-disp);font-weight:150;font-size:112px;line-height:.9;letter-spacing:-.05em;
    text-shadow:0 4px 40px rgba(0,0,0,.22);padding-left:.06em;}
  .hero .temp .o{font-weight:150;opacity:.5;}
  .hero .cond{font-size:18px;font-weight:500;margin-top:6px;letter-spacing:.01em;}
  .hero .meta{display:flex;gap:16px;justify-content:center;margin-top:9px;font-size:15px;color:var(--ink-dim);}
  .hero .meta b{color:var(--ink);font-weight:600;}
  .feels{font-size:13px;color:var(--ink-faint);margin-top:5px;}

  /* alerts */
  .alerts{display:flex;flex-direction:column;gap:9px;}
  .alert{border-radius:16px;padding:13px 15px;border:1px solid rgba(255,209,92,.42);
    background:linear-gradient(180deg,rgba(255,209,92,.20),rgba(255,209,92,.07));cursor:pointer;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:inset 0 1px 0 rgba(255,255,255,.14);}
  .alert.sev-bad{border-color:rgba(255,125,107,.5);background:linear-gradient(180deg,rgba(255,125,107,.2),rgba(255,125,107,.08));}
  .alert .a-top{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14.5px;}
  .alert .a-top .adot{width:9px;height:9px;border-radius:50%;background:var(--alert);flex:none;box-shadow:0 0 12px var(--alert);}
  .alert.sev-bad .a-top .adot{background:var(--alert-bad);box-shadow:0 0 12px var(--alert-bad);}
  .alert .a-body{font-size:12.5px;color:var(--ink-dim);margin-top:8px;line-height:1.55;display:none;white-space:pre-wrap;}
  .alert.open .a-body{display:block;}
  .alert .a-hint{font-size:11px;color:var(--ink-faint);margin-top:6px;}

  /* card */
  .card{position:relative;border-radius:var(--card);overflow:hidden;
    background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.045));
    border:1px solid var(--stroke);border-top-color:rgba(255,255,255,.26);
    backdrop-filter:blur(22px) saturate(1.25);-webkit-backdrop-filter:blur(22px) saturate(1.25);
    box-shadow:0 12px 34px -16px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.12);}
  .card h2{margin:0;padding:15px 16px 2px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink-faint);font-weight:600;}

  /* hourly temperature curve */
  .hourly{overflow-x:auto;overflow-y:hidden;padding:6px 6px 6px;scrollbar-width:none;}
  .hourly::-webkit-scrollbar{display:none;}
  .hourly svg{display:block;}
  .cv-temp{fill:var(--ink);font:600 13px var(--f-num);}
  .cv-hr{fill:var(--ink-faint);font:500 12px var(--f-ui);}
  .cv-hr.now{fill:var(--accent);font-weight:700;}
  .cv-dot{fill:rgba(255,255,255,.85);}
  .cv-dot-now{fill:var(--accent);stroke:#fff;stroke-width:2;}

  /* daily */
  .daily{padding:7px 8px 10px;}
  .day{display:grid;grid-template-columns:50px 28px 38px 1fr 82px;align-items:center;gap:10px;padding:10px 9px;border-radius:14px;transition:background .2s;}
  .day.today{background:linear-gradient(90deg,rgba(255,255,255,.09),rgba(255,255,255,.02));}
  .day+.day{border-top:1px solid rgba(255,255,255,.07);}
  .day .d-n{font-size:14.5px;font-weight:600;}
  .day .d-g{width:26px;height:26px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.25));}
  .day .d-p{font-size:11px;color:#9fd2ff;font-family:var(--f-num);font-weight:600;}
  .day .bar{position:relative;height:6px;border-radius:3px;background:rgba(255,255,255,.14);overflow:hidden;}
  .day .bar .rng{position:absolute;height:100%;border-radius:3px;background:linear-gradient(90deg,#6fb6ff,#ffd06b,#ff9d5c);}
  .day .d-hl{font-size:14px;text-align:right;font-family:var(--f-num);font-weight:600;}
  .day .d-hl .lo{color:var(--ink-faint);font-weight:500;}

  /* details */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .tile{position:relative;border-radius:18px;padding:14px 15px;min-height:92px;
    background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.045));
    border:1px solid var(--stroke);border-top-color:rgba(255,255,255,.24);
    backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
    box-shadow:0 10px 26px -16px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);}
  .tile .t-l{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);display:flex;align-items:center;gap:7px;}
  .tile .t-l svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;opacity:.9;}
  .tile .t-v{font-family:var(--f-disp);font-size:28px;font-weight:300;margin-top:10px;letter-spacing:-.02em;}
  .tile .t-s{font-size:11.5px;color:var(--ink-faint);margin-top:3px;}

  /* radar */
  .radar-card{padding-bottom:11px;}
  #map{height:320px;width:100%;background:#0a0d12;margin-top:12px;}
  .leaflet-container{background:#0a0d12;font-family:var(--f-ui);}
  .leaflet-control-attribution{background:rgba(10,13,18,.6)!important;color:rgba(255,255,255,.5)!important;}
  .leaflet-control-attribution a{color:rgba(255,255,255,.7)!important;}
  .radar-ctl{display:flex;align-items:center;gap:12px;padding:12px 15px 4px;}
  .playbtn{width:44px;height:44px;flex:none;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(180deg,var(--accent),var(--accent-hot));color:#3a1e0c;
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px -6px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .08s;}
  .playbtn:active{transform:scale(.92);}
  .playbtn svg{width:19px;height:19px;fill:currentColor;}
  .scrub{flex:1;display:flex;flex-direction:column;gap:5px;}
  .scrub input{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.16);outline:none;}
  .scrub input::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.5);cursor:pointer;}
  .scrub .stamp{font-size:11.5px;color:var(--ink-dim);font-family:var(--f-num);font-weight:600;display:flex;justify-content:space-between;}
  .scrub .stamp .future{color:var(--accent);}

  .foot{text-align:center;font-size:11px;color:var(--ink-faint);line-height:1.7;padding:2px 8px;}
  .foot a{color:var(--ink-dim);}

  /* search sheet */
  .sheet{position:fixed;inset:0;z-index:40;background:rgba(6,10,20,.5);backdrop-filter:blur(10px);
    display:none;align-items:flex-start;justify-content:center;padding:84px 16px 16px;}
  .sheet.on{display:flex;}
  .sheet .box{width:100%;max-width:440px;border-radius:20px;padding:15px;
    background:linear-gradient(180deg,rgba(30,42,66,.96),rgba(20,30,50,.96));border:1px solid var(--stroke);
    box-shadow:0 30px 60px -20px rgba(0,0,0,.6);}
  .sheet input{width:100%;background:rgba(255,255,255,.09);border:1px solid var(--stroke);border-radius:13px;
    color:var(--ink);font-size:16px;padding:14px 15px;outline:none;font-family:var(--f-ui);}
  .sheet input:focus{border-color:var(--accent);}
  .results{margin-top:9px;max-height:52vh;overflow:auto;}
  .results button{display:flex;flex-direction:column;align-items:flex-start;width:100%;text-align:left;
    background:transparent;border:0;border-radius:11px;color:var(--ink);padding:12px 13px;cursor:pointer;gap:2px;}
  .results button:active{background:rgba(255,255,255,.08);}
  .results .r-n{font-size:15px;font-weight:600;}
  .results .r-s{font-size:12px;color:var(--ink-faint);}
  .results .r-empty{color:var(--ink-faint);font-size:13px;padding:13px;}

  .toast{position:fixed;left:50%;bottom:calc(26px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:rgba(20,30,50,.96);border:1px solid var(--stroke);color:var(--ink);font-size:13px;
    padding:12px 17px;border-radius:13px;z-index:50;opacity:0;transition:opacity .3s;pointer-events:none;max-width:88vw;text-align:center;box-shadow:0 12px 30px -12px rgba(0,0,0,.6);}
  .toast.on{opacity:1;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body data-sky="clear-day">
<div class=\"stars\"></div>
<div class=\"grain\"></div>
<div class="app">
  <div class="head">
    <div class="loc">
      <div class="name" id="locName">Locating…</div>
      <div class="upd" id="locUpd">—</div>
    </div>
    <div class="hbtns">
      <button class="icobtn" id="btnLoc" title="Use my location"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></button>
      <button class="icobtn" id="btnSearch" title="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg></button>
    </div>
  </div>

  <div class="hero">
    <div class="glyph" id="heroGlyph"></div>
    <div class="temp" id="heroTemp">—<span class="o">°</span></div>
    <div class="cond" id="heroCond">—</div>
    <div class="meta"><span>H:<b id="heroHi">—</b></span><span>L:<b id="heroLo">—</b></span></div>
    <div class="feels" id="heroFeels"></div>
  </div>

  <div class="alerts" id="alerts"></div>

  <div class="card">
    <h2>Hourly</h2>
    <div class="hourly" id="hourly"></div>
  </div>

  <div class="card radar-card">
    <h2 style="padding-bottom:0">Radar · The Weather Channel colors</h2>
    <div id="map"></div>
    <div class="radar-ctl">
      <button class="playbtn" id="playBtn"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <div class="scrub">
        <input type="range" id="scrub" min="0" max="0" value="0">
        <div class="stamp"><span id="stampNow">—</span><span id="stampFut" class="future"></span></div>
      </div>
    </div>
  </div>

  <div class="card"><h2>10‑day forecast</h2><div class="daily" id="daily"></div></div>

  <div class="grid" id="details"></div>

  <div class="foot">
    Forecast: Open‑Meteo · US temps: National Weather Service · Radar: RainViewer<br>
    Add to Home Screen for full‑screen, app‑like use.
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="box">
    <input id="searchInput" placeholder="Search city or place…" autocomplete="off" autocapitalize="words">
    <div class="results" id="results"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
"use strict";
/* ============ Skyline — a smoother, ad-free weather app ============
   Forecast : Open-Meteo (no key, global)
   Radar    : RainViewer public tiles (no key), color scheme 4 = Weather Channel
   Alerts   : api.weather.gov (US, official)
   =================================================================== */

const DEFAULT = { lat:27.9506, lon:-82.4572, name:"Tampa, FL" }; // fallback only
let unit = localStorage.getItem("sky_unit") || "F";
let place = JSON.parse(localStorage.getItem("sky_place")||"null") || DEFAULT;

const $ = s => document.querySelector(s);
const el = id => document.getElementById(id);
const tempU = () => unit==="F" ? "fahrenheit" : "celsius";
const windU = () => unit==="F" ? "mph" : "kmh";
const precU = () => unit==="F" ? "inch" : "mm";

/* ---------- weather-code → icon + label + sky theme ---------- */
const G = {}; // glyph builder cache
function svg(inner,vb="0 0 64 64"){return `<svg viewBox="${vb}" style="width:100%;height:100%">${inner}</svg>`;}
const C = { sun:"#ffd166", sunCore:"#ffe08a", moon:"#eaf0ff", cloud:"#eef3fa", cloudBk:"#b7c3d6", cloudDk:"#c3cede", rain:"#7cc4ff", bolt:"#ffd166", snow:"#eef6ff", shadow:"rgba(20,30,50,.16)" };
function svg(inner,vb="0 0 64 64"){return `<svg viewBox="${vb}" style="width:100%;height:100%">${inner}</svg>`;}
function sunCore(cx,cy,r){return `<circle cx="${cx}" cy="${cy}" r="${r*1.5}" fill="${C.sun}" opacity=".16"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="${C.sun}"/><circle cx="${cx-r*0.3}" cy="${cy-r*0.3}" r="${r*0.55}" fill="${C.sunCore}" opacity=".7"/>`;}
function rays(cx,cy,r0,r1){let p="";for(let i=0;i<8;i++){const a=i*45*Math.PI/180,x=cx+Math.cos(a)*r0,y=cy+Math.sin(a)*r0,x2=cx+Math.cos(a)*r1,y2=cy+Math.sin(a)*r1;p+=`<line x1="${x.toFixed(1)}" y1="${y.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${C.sun}" stroke-width="2.6" stroke-linecap="round"/>`;}return p;}
function gSun(){return svg(rays(32,32,20,26)+sunCore(32,32,12));}
function gMoon(){return svg(`<circle cx="32" cy="31" r="17" fill="${C.moon}" opacity=".14"/><path d="M43 39a15 15 0 1 1-13-23 12 12 0 0 0 13 23z" fill="${C.moon}"/>`);}
function cloudBody(fill,dx,dy){return `<path transform="translate(${dx},${dy})" d="M20 44h26a10 10 0 0 0 1-20 14 14 0 0 0-26-3 9 9 0 0 0-1 23z" fill="${fill}"/>`;}
function cloudDepth(front){return `<ellipse cx="33" cy="47" rx="20" ry="4" fill="${C.shadow}"/>`+cloudBody(C.cloudBk,3,2)+cloudBody(front,0,0);}
function gCloud(){return svg(cloudDepth(C.cloud));}
function gPartlyDay(){return svg(rays(23,22,11,15)+sunCore(23,22,7.5)+cloudDepth(C.cloud));}
function gPartlyNight(){return svg(`<path d="M30 25a9 9 0 1 1-7-14 7 7 0 0 0 7 14z" fill="${C.moon}"/>`+cloudDepth(C.cloud));}
function drop(x,y,len){return `<line x1="${x}" y1="${y}" x2="${x-2}" y2="${y+len}" stroke="${C.rain}" stroke-width="3.2" stroke-linecap="round"/>`;}
function gRain(){return svg(cloudDepth(C.cloudDk)+drop(25,50,7)+drop(34,52,9)+drop(43,50,7));}
function gStorm(){return svg(cloudDepth(C.cloudDk)+`<path d="M34 43l-7 11h6l-4 8 12-14h-7l5-6z" fill="${C.bolt}"/>`);}
function flake(x,y){return `<circle cx="${x}" cy="${y}" r="2.6" fill="${C.snow}"/>`;}
function gSnow(){return svg(cloudDepth(C.cloudDk)+flake(24,51)+flake(34,55)+flake(44,51));}
function gFog(){return svg(cloudDepth(C.cloud)+`<line x1="16" y1="51" x2="46" y2="51" stroke="${C.cloudBk}" stroke-width="3.2" stroke-linecap="round" opacity=".85"/><line x1="20" y1="57" x2="50" y2="57" stroke="${C.cloudBk}" stroke-width="3.2" stroke-linecap="round" opacity=".6"/>`);}

function decode(code, isDay){
  const d = isDay!==0;
  if(code===0) return {label:d?"Clear":"Clear night", glyph:d?gSun:gMoon, sky:d?"clear-day":"clear-night"};
  if(code===1||code===2) return {label:"Partly cloudy", glyph:d?gPartlyDay:gPartlyNight, sky:d?"pcloud-day":"pcloud-night"};
  if(code===3) return {label:"Overcast", glyph:gCloud, sky:d?"cloud-day":"cloud-night"};
  if(code===45||code===48) return {label:"Fog", glyph:gFog, sky:"fog"};
  if(code>=51&&code<=57) return {label:"Drizzle", glyph:gRain, sky:"rain"};
  if(code>=61&&code<=67) return {label:"Rain", glyph:gRain, sky:"rain"};
  if(code>=71&&code<=77) return {label:"Snow", glyph:gSnow, sky:"snow"};
  if(code>=80&&code<=82) return {label:"Rain showers", glyph:gRain, sky:"rain"};
  if(code===85||code===86) return {label:"Snow showers", glyph:gSnow, sky:"snow"};
  if(code>=95) return {label:"Thunderstorm", glyph:gStorm, sky:"storm"};
  return {label:"—", glyph:gCloud, sky:"cloud-day"};
}
const SKIES = {
  "clear-day":["#0f2f5e","#2464a8","#5fa0dc","rgba(255,196,120,.34)"], "clear-night":["#050912","#0c1734","#1d2a58","rgba(120,150,255,.14)"],
  "pcloud-day":["#1a3a63","#3c6fa6","#84a9cf","rgba(255,205,140,.24)"], "pcloud-night":["#080e22","#182247","#2f3a66","rgba(120,150,255,.12)"],
  "cloud-day":["#2b3f57","#4f6884","#8296ad","rgba(220,230,245,.16)"], "cloud-night":["#0d131c","#212b3b","#3a4658","rgba(160,180,210,.1)"],
  "rain":["#132530","#25434f","#3d6070","rgba(140,190,230,.18)"], "storm":["#0f1320","#212637","#39405c","rgba(180,160,255,.16)"],
  "snow":["#2f3f52","#59718d","#9db2cd","rgba(230,240,255,.22)"], "fog":["#28323d","#485564","#7a8a9d","rgba(210,220,235,.16)"]
};
function setSky(key){
  const s = SKIES[key]||SKIES["clear-day"];
  document.body.dataset.sky=key;
  document.documentElement.style.setProperty("--sky1",s[0]);
  document.documentElement.style.setProperty("--sky2",s[1]);
  document.documentElement.style.setProperty("--sky3",s[2]);
  document.documentElement.style.setProperty("--glow",s[3]||"transparent");
  const meta=document.querySelector('meta[name=theme-color]'); if(meta) meta.content=s[0];
}

/* ---------- formatting ---------- */
const rnd = n => Math.round(n);
const fmtT = n => (n==null?"—":rnd(n))+"°";
function hourLabel(iso){const d=new Date(iso);let h=d.getHours();const ap=h<12?"AM":"PM";h=h%12;if(h===0)h=12;return h+ap;}
function dayLabel(iso,i){if(i===0)return "Today";return new Date(iso+"T00:00").toLocaleDateString([], {weekday:"short"});}
function clockLabel(ts){return new Date(ts*1000).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});}

/* ---------- toast ---------- */
let toastT;
function toast(msg){const t=el("toast");t.textContent=msg;t.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("on"),2600);}

/* ---------- fetch forecast ---------- */
async function loadWeather(){
  el("locName").textContent = place.name;
  const p = new URLSearchParams({
    latitude:place.lat, longitude:place.lon,
    current:"temperature_2m,relative_humidity_2m,apparent_temperature,is_day,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,precipitation",
    hourly:"temperature_2m,weather_code,precipitation_probability,is_day",
    daily:"weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset,uv_index_max",
    temperature_unit:tempU(), wind_speed_unit:windU(), precipitation_unit:precU(),
    timezone:"auto", forecast_days:"10"
  });
  let data;
  try{
    const r = await fetch("https://api.open-meteo.com/v1/forecast?"+p.toString());
    if(!r.ok) throw new Error("HTTP "+r.status);
    data = await r.json();
  }catch(e){ toast("Couldn't load forecast. Check connection."); console.error(e); return; }
  renderCurrent(data);
  renderHourly(data);
  renderDaily(data);
  renderDetails(data);
  el("locUpd").textContent = "Updated "+new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});
  loadAlerts();
  centerRadar();
  patchWithNWS(data);   // US: correct temps to official NWS numbers
}

/* ---------- NWS temperature correction (US only, best-effort) ----------
   Open-Meteo runs ~2-3° warm vs NWS in some regions. For US points we
   overlay the official NWS forecast temps (same source as Weather Channel).
   Keeps Open-Meteo's codes, details, sun times, UV, days 8-10, and all
   non-US locations untouched. Silently does nothing if NWS isn't available. */
async function patchWithNWS(d){
  try{
    const nh = {headers:{"Accept":"application/geo+json"}};
    const pr = await fetch(`https://api.weather.gov/points/${place.lat.toFixed(4)},${place.lon.toFixed(4)}`, nh);
    if(!pr.ok) return;                       // non-US → 404 → keep Open-Meteo
    const pj = await pr.json();
    const hourlyUrl = pj.properties && pj.properties.forecastHourly;
    const dailyUrl  = pj.properties && pj.properties.forecast;
    if(!hourlyUrl) return;
    const [hr, dr] = await Promise.all([ fetch(hourlyUrl, nh), dailyUrl?fetch(dailyUrl, nh):Promise.resolve(null) ]);
    if(!hr.ok) return;
    const periods = (await hr.json()).properties.periods;   // hourly, °F
    const toU = f => unit==="F" ? f : (f-32)*5/9;
    const epochHr = t => Math.floor(Date.parse(t)/3600000);

    // hourly map
    const hmap = new Map();
    periods.forEach(p=>hmap.set(epochHr(p.startTime), {
      temp:p.temperature,
      pop:(p.probabilityOfPrecipitation&&p.probabilityOfPrecipitation.value),
      rh:(p.relativeHumidity&&p.relativeHumidity.value)
    }));

    // patch hourly array in place
    for(let i=0;i<d.hourly.time.length;i++){
      const m=hmap.get(epochHr(d.hourly.time[i]));
      if(m){ d.hourly.temperature_2m[i]=toU(m.temp); if(m.pop!=null) d.hourly.precipitation_probability[i]=m.pop; }
    }
    // patch current
    const cm = hmap.get(Math.floor(Date.now()/3600000)) || (periods[0] && {temp:periods[0].temperature, rh:(periods[0].relativeHumidity&&periods[0].relativeHumidity.value)});
    if(cm){
      const newT=toU(cm.temp);
      const delta=newT - d.current.temperature_2m;
      d.current.temperature_2m=newT;
      d.current.apparent_temperature += delta;           // shift feels-like by same amount
      if(cm.rh!=null) d.current.relative_humidity_2m=cm.rh;
    }
    // patch daily (only where NWS has a full day/night pair, so "Today" high isn't lost in the evening)
    if(dr && dr.ok){
      const byDate=new Map();
      (await dr.json()).properties.periods.forEach(p=>{
        const date=p.startTime.slice(0,10);
        const o=byDate.get(date)||{day:null,night:null,pops:[]};
        if(p.isDaytime) o.day=p.temperature; else o.night=p.temperature;
        const pop=(p.probabilityOfPrecipitation&&p.probabilityOfPrecipitation.value); if(pop!=null)o.pops.push(pop);
        byDate.set(date,o);
      });
      for(let i=0;i<d.daily.time.length;i++){
        const o=byDate.get(d.daily.time[i]); if(!o) continue;
        if(o.day!=null)   d.daily.temperature_2m_max[i]=toU(o.day);
        if(o.night!=null) d.daily.temperature_2m_min[i]=toU(o.night);
        if(o.pops.length) d.daily.precipitation_probability_max[i]=Math.max(...o.pops);
      }
    }
    // re-render with corrected numbers
    renderCurrent(d); renderHourly(d); renderDaily(d); renderDetails(d);
    el("locUpd").textContent = "Updated "+new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"})+" · NWS";
  }catch(e){ /* keep Open-Meteo values on any error */ }
}

function renderCurrent(d){
  const c=d.current, day=d.daily;
  const info=decode(c.weather_code, c.is_day);
  setSky(info.sky);
  el("heroGlyph").innerHTML=info.glyph();
  el("heroTemp").innerHTML=rnd(c.temperature_2m)+'<span class="o">°</span>';
  el("heroCond").textContent=info.label;
  el("heroHi").textContent=fmtT(day.temperature_2m_max[0]);
  el("heroLo").textContent=fmtT(day.temperature_2m_min[0]);
  const feels=rnd(c.apparent_temperature);
  el("heroFeels").textContent = "Feels like "+feels+"°";
  window.__cur=c;
}

function smoothPath(p){
  if(p.length<2) return p.length?`M ${p[0][0]} ${p[0][1]}`:"";
  let d=`M ${p[0][0]} ${p[0][1]}`;
  for(let i=0;i<p.length-1;i++){
    const p0=p[i-1]||p[i],p1=p[i],p2=p[i+1],p3=p[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0]} ${p2[1]}`;
  }
  return d;
}
function renderHourly(d){
  const h=d.hourly, now=Date.now();
  let start=h.time.findIndex(t=>new Date(t).getTime()>=now-3600e3); if(start<0)start=0;
  const idx=[]; for(let i=start;i<start+24 && i<h.time.length;i++) idx.push(i);
  if(!idx.length){el("hourly").innerHTML="";return;}
  const temps=idx.map(i=>Math.round(h.temperature_2m[i]));
  const pops=idx.map(i=>h.precipitation_probability[i]||0);
  const step=56,padL=30,padR=30,gTop=8,gH=22,cTop=54,cH=76,popH=20,botH=30;
  const H=cTop+cH+popH+botH, W=padL+padR+(idx.length-1)*step;
  const minT=Math.min(...temps),maxT=Math.max(...temps),span=Math.max(1,maxT-minT);
  const X=k=>padL+k*step, Y=t=>cTop+(1-(t-minT)/span)*cH;
  const pts=temps.map((t,k)=>[X(k),Y(t)]);
  const line=smoothPath(pts);
  const area=`${line} L ${X(idx.length-1)} ${cTop+cH+2} L ${padL} ${cTop+cH+2} Z`;
  let g="",dots="",tl="",hl="",bars="";
  idx.forEach((i,k)=>{
    const cx=X(k);
    g+=`<g transform="translate(${cx-11},${gTop}) scale(0.344)">${decode(h.weather_code[i],h.is_day[i]).glyph()}</g>`;
    tl+=`<text x="${cx}" y="${Y(temps[k])-11}" text-anchor="middle" class="cv-temp">${temps[k]}\u00b0</text>`;
    hl+=`<text x="${cx}" y="${H-12}" text-anchor="middle" class="cv-hr ${k===0?'now':''}">${k===0?'Now':hourLabel(h.time[i])}</text>`;
    if(pops[k]>=10){const ph=(pops[k]/100)*popH;bars+=`<rect x="${cx-5}" y="${cTop+cH+popH-ph+4}" width="10" height="${ph}" rx="3" fill="rgba(130,195,255,.55)"/>`;}
  });
  idx.forEach((i,k)=>{ const cx=X(k); dots+=`<circle cx="${cx}" cy="${Y(temps[k])}" r="${k===0?4.5:2.4}" class="${k===0?'cv-dot-now':'cv-dot'}"/>`; });
  el("hourly").innerHTML=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
    <path d="${area}" fill="rgba(255,255,255,.16)"/>
    <path d="${line}" fill="none" stroke="rgba(255,255,255,.92)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    ${g}${bars}${dots}${tl}${hl}</svg>`;
}

function renderDaily(d){
  const dl=d.daily; const box=el("daily"); box.innerHTML="";
  let gMin=Math.min(...dl.temperature_2m_min), gMax=Math.max(...dl.temperature_2m_max);
  const span=Math.max(1,gMax-gMin);
  for(let i=0;i<dl.time.length;i++){
    const info=decode(dl.weather_code[i],1);
    const lo=dl.temperature_2m_min[i], hi=dl.temperature_2m_max[i];
    const left=((lo-gMin)/span)*100, width=Math.max(8,((hi-lo)/span)*100);
    const pop=dl.precipitation_probability_max[i];
    const row=document.createElement("div"); row.className="day"+(i===0?" today":"");
    row.innerHTML=`<div class="d-n">${dayLabel(dl.time[i],i)}</div>
      <div class="d-g">${info.glyph()}</div>
      <div class="d-p">${pop>=10?pop+"%":""}</div>
      <div class="bar"><div class="rng" style="left:${left}%;width:${width}%"></div></div>
      <div class="d-hl"><span class="lo">${fmtT(lo)}</span> ${fmtT(hi)}</div>`;
    box.appendChild(row);
  }
}

function icoWind(){return '<svg viewBox="0 0 24 24"><path d="M3 8h11a3 3 0 1 0-3-3M3 12h15a3 3 0 1 1-3 3M3 16h9a2.5 2.5 0 1 1-2.5 2.5"/></svg>';}
function icoDrop(){return '<svg viewBox="0 0 24 24"><path d="M12 3s6 6.5 6 11a6 6 0 0 1-12 0c0-4.5 6-11 6-11z"/></svg>';}
function icoSun(){return '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>';}
function icoGauge(){return '<svg viewBox="0 0 24 24"><path d="M4 15a8 8 0 1 1 16 0"/><path d="M12 15l4-4"/></svg>';}
function icoUp(){return '<svg viewBox="0 0 24 24"><path d="M12 19V5M6 11l6-6 6 6"/></svg>';}
function icoDown(){return '<svg viewBox="0 0 24 24"><path d="M12 5v14M6 13l6 6 6-6"/></svg>';}
const WDIR=["N","NE","E","SE","S","SW","W","NW"];
function windDir(deg){return WDIR[Math.round(deg/45)%8];}

function renderDetails(d){
  const c=d.current, dl=d.daily;
  const uv=dl.uv_index_max[0];
  const uvTxt = uv==null?"—":(uv<3?"Low":uv<6?"Moderate":uv<8?"High":uv<11?"Very high":"Extreme");
  const wu = unit==="F"?"mph":"km/h";
  const pu = unit==="F"?'"Hg':"hPa";
  const pv = unit==="F"? (c.surface_pressure*0.02953).toFixed(2) : rnd(c.surface_pressure);
  const items=[
    {l:"Feels like",ico:icoSun(),v:rnd(c.apparent_temperature)+"°",s:"Actual "+rnd(c.temperature_2m)+"°"},
    {l:"Humidity",ico:icoDrop(),v:c.relative_humidity_2m+"%",s:""},
    {l:"Wind",ico:icoWind(),v:rnd(c.wind_speed_10m)+" "+wu,s:"From "+windDir(c.wind_direction_10m)},
    {l:"UV index",ico:icoSun(),v:(uv==null?"—":Math.round(uv)),s:uvTxt},
    {l:"Sunrise",ico:icoUp(),v:new Date(dl.sunrise[0]).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}),s:""},
    {l:"Sunset",ico:icoDown(),v:new Date(dl.sunset[0]).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}),s:""},
    {l:"Pressure",ico:icoGauge(),v:pv,s:pu},
    {l:"Precip prob",ico:icoDrop(),v:(dl.precipitation_probability_max[0]??0)+"%",s:"today max"}
  ];
  el("details").innerHTML=items.map(it=>`<div class="tile"><div class="t-l">${it.ico}${it.l}</div><div class="t-v">${it.v}</div><div class="t-s">${it.s||""}</div></div>`).join("");
}

/* ---------- alerts (US, NWS) ---------- */
async function loadAlerts(){
  const box=el("alerts"); box.innerHTML="";
  try{
    const r=await fetch(`https://api.weather.gov/alerts/active?point=${place.lat.toFixed(4)},${place.lon.toFixed(4)}`,
      {headers:{"Accept":"application/geo+json"}});
    if(!r.ok) return;
    const j=await r.json();
    if(!j.features||!j.features.length) return;
    const seen=new Set();
    j.features.slice(0,4).forEach(f=>{
      const p=f.properties; if(seen.has(p.event))return; seen.add(p.event);
      const bad=/warning|emergency|extreme/i.test((p.severity||"")+p.event);
      const div=document.createElement("div");
      div.className="alert"+(bad?" sev-bad":"");
      div.innerHTML=`<div class="a-top"><span class="adot"></span>${p.event}</div>
        <div class="a-hint">Tap for details · ${p.senderName||"NWS"}</div>
        <div class="a-body">${(p.headline||"")}\n\n${(p.description||"").slice(0,700)}</div>`;
      div.addEventListener("click",()=>div.classList.toggle("open"));
      box.appendChild(div);
    });
  }catch(e){ /* alerts are US-only / best-effort */ }
}

/* ============ RADAR (RainViewer + Leaflet) ============ */
let map, radarFrames=[], radarLayers={}, radarPos=0, radarTimer=null, radarHost="";
const RADAR_COLOR=4;   // 4 = The Weather Channel
const FRAME_MS=480;

function initMap(){
  map=L.map("map",{zoomControl:true,attributionControl:true,maxZoom:12,minZoom:3}).setView([place.lat,place.lon],7);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
    subdomains:"abcd", attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19
  }).addTo(map);
  L.circleMarker([place.lat,place.lon],{radius:6,color:"#fff",weight:2,fillColor:"#ffb26b",fillOpacity:1}).addTo(map);
  loadRadar();
}
function centerRadar(){
  if(!map) return;
  map.setView([place.lat,place.lon],map.getZoom()||7);
  // refresh marker
  map.eachLayer(l=>{ if(l instanceof L.CircleMarker) map.removeLayer(l); });
  L.circleMarker([place.lat,place.lon],{radius:6,color:"#fff",weight:2,fillColor:"#ffb26b",fillOpacity:1}).addTo(map);
}
async function loadRadar(){
  try{
    const r=await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const j=await r.json();
    radarHost=j.host;
    const past=(j.radar&&j.radar.past)||[];
    const now=(j.radar&&j.radar.nowcast)||[];
    radarFrames=past.concat(now);
    __nowIdx=Math.max(0,past.length-1);   // last past frame = "now"
    // clear old layers
    Object.values(radarLayers).forEach(l=>map.removeLayer(l)); radarLayers={};
    el("scrub").max=Math.max(0,radarFrames.length-1);
    radarPos=__nowIdx;   // start at "now"
    el("scrub").value=radarPos;
    showFrame(radarPos);
    play(); // autoplay the loop
  }catch(e){ el("stampNow").textContent="Radar unavailable"; }
}
function frameLayer(i){
  if(radarLayers[i]) return radarLayers[i];
  const f=radarFrames[i];
  const url=`${radarHost}${f.path}/512/{z}/{x}/{y}/${RADAR_COLOR}/1_1.png`;
  const layer=L.tileLayer(url,{opacity:0,maxNativeZoom:7,maxZoom:12,tileSize:256});
  layer.addTo(map); radarLayers[i]=layer; return layer;
}
function showFrame(i){
  radarFrames.forEach((_,k)=>{ if(radarLayers[k]) radarLayers[k].setOpacity(0); });
  const layer=frameLayer(i); layer.setOpacity(0.75);
  // preload neighbour
  if(radarFrames[i+1]) frameLayer(i+1);
  const f=radarFrames[i];
  const pastCount=radarFrames.length; // stamp
  const future = i>getNowIndex();
  el("stampNow").textContent=(future?"Forecast · ":"")+clockLabel(f.time);
  el("stampFut").textContent = future? "+"+Math.round((f.time-radarFrames[getNowIndex()].time)/60)+" min" : "now";
  el("scrub").value=i;
}
let __nowIdx=0;
function getNowIndex(){return __nowIdx;}
function play(){
  el("playIcon").innerHTML='<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  clearInterval(radarTimer);
  radarTimer=setInterval(()=>{
    radarPos++; if(radarPos>=radarFrames.length) radarPos=0;
    showFrame(radarPos);
  },FRAME_MS);
}
function pause(){ el("playIcon").innerHTML='<path d="M8 5v14l11-7z"/>'; clearInterval(radarTimer); radarTimer=null; }

/* ---------- geolocation + search ---------- */
function useMyLocation(){
  if(!navigator.geolocation){ toast("Location not available"); return; }
  toast("Getting your location…");
  navigator.geolocation.getCurrentPosition(async pos=>{
    place={lat:pos.coords.latitude, lon:pos.coords.longitude, name:"My location"};
    // reverse geocode for a nice name
    try{
      const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?latitude=${place.lat}&longitude=${place.lon}&count=1`);
      const j=await r.json();
      if(j.results&&j.results[0]){const g=j.results[0];place.name=g.name+(g.admin1?", "+g.admin1:"");}
    }catch(e){}
    savePlace(); loadWeather();
  },err=>{ toast("Location permission denied"); }, {enableHighAccuracy:false,timeout:8000,maximumAge:600000});
}
function savePlace(){ localStorage.setItem("sky_place",JSON.stringify(place)); }

let searchT;
async function doSearch(q){
  const box=el("results");
  if(!q.trim()){box.innerHTML="";return;}
  try{
    const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=en&format=json`);
    const j=await r.json();
    if(!j.results||!j.results.length){box.innerHTML='<div class="r-empty">No matches.</div>';return;}
    box.innerHTML="";
    j.results.forEach(g=>{
      const sub=[g.admin1,g.country].filter(Boolean).join(", ");
      const b=document.createElement("button");
      b.innerHTML=`<span class="r-n">${g.name}</span><span class="r-s">${sub}</span>`;
      b.addEventListener("click",()=>{
        place={lat:g.latitude,lon:g.longitude,name:g.name+(g.admin1?", "+g.admin1:"")};
        savePlace(); closeSheet(); loadWeather();
      });
      box.appendChild(b);
    });
  }catch(e){ box.innerHTML='<div class="r-empty">Search failed.</div>'; }
}
function openSheet(){el("sheet").classList.add("on");el("searchInput").value="";el("results").innerHTML="";setTimeout(()=>el("searchInput").focus(),50);}
function closeSheet(){el("sheet").classList.remove("on");}

/* ---------- unit toggle via tapping hero temp ---------- */
function toggleUnit(){ unit = unit==="F"?"C":"F"; localStorage.setItem("sky_unit",unit); toast("Units: °"+unit); loadWeather(); }

/* ---------- boot ---------- */
window.addEventListener("DOMContentLoaded",()=>{
  el("btnLoc").addEventListener("click",useMyLocation);
  el("btnSearch").addEventListener("click",openSheet);
  el("sheet").addEventListener("click",e=>{ if(e.target===el("sheet")) closeSheet(); });
  el("searchInput").addEventListener("input",e=>{ clearTimeout(searchT); const v=e.target.value; searchT=setTimeout(()=>doSearch(v),300); });
  el("heroTemp").addEventListener("click",toggleUnit);
  el("playBtn").addEventListener("click",()=>{ radarTimer?pause():play(); });
  el("scrub").addEventListener("input",e=>{ pause(); radarPos=+e.target.value; showFrame(radarPos); });

  initMap();
  loadWeather();
  // nudge nowIndex: past frames end where nowcast begins — approximate as middle
});
</script>
